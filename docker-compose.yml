version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bhau_fitness_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=BhauSecurePassword123!
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "BhauSecurePassword123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: bhau_fitness_api
    container_name: bhau_fitness_api
    build:
      context: ./backend/BhauFitnessApi
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=BhauFitnessDb;User Id=sa;Password=BhauSecurePassword123!;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=REPLACE_ME_WITH_A_LONG_RANDOM_SECRET_IN_PRODUCTION
      - Jwt__Issuer=BhauFitnessApi
      - Jwt__Audience=BhauFitnessFlutterApp
      # Set via a .env file or shell environment — never commit a real key here.
      - Gemini__ApiKey=${GEMINI_API_KEY:-}
      - Razorpay__KeyId=rzp_test_placeholder
      - Razorpay__KeySecret=placeholder_secret
    depends_on:
      db:
        condition: service_healthy

volumes:
  mssql_data:
