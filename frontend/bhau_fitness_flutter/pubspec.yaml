name: bhau_fitness_flutter
description: "BHAU FITNESS — Flutter client for the ASP.NET Core + MSSQL backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  flutter_secure_storage: ^10.3.1
  intl: ^0.20.3
  google_fonts: ^8.1.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
