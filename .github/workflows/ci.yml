name: BHAU FITNESS CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore backend/BhauFitnessApi/BhauFitnessApi.csproj

    - name: Build Backend
      run: dotnet build backend/BhauFitnessApi/BhauFitnessApi.csproj --no-restore -c Release

    - name: Run Backend Tests
      run: dotnet test backend/BhauFitnessApi.Tests/BhauFitnessApi.Tests.csproj -c Release

  frontend-build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.22.x'

    - name: Install dependencies
      run: |
        cd frontend/bhau_fitness_flutter
        flutter pub get

    - name: Analyze code
      run: |
        cd frontend/bhau_fitness_flutter
        flutter analyze

    - name: Run Widget Tests
      run: |
        cd frontend/bhau_fitness_flutter
        flutter test

    - name: Build Web Application
      run: |
        cd frontend/bhau_fitness_flutter
        flutter build web --base-href "/bhau-fitness/"

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/bhau_fitness_flutter/build/web

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build-and-deploy]
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker API Image
      run: docker build -t bhau-fitness-api:latest ./backend/BhauFitnessApi
