name: BHAU FITNESS CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore backend/BhauFitnessApi/BhauFitnessApi.csproj

    - name: Build Backend
      run: dotnet build backend/BhauFitnessApi/BhauFitnessApi.csproj --no-restore -c Release

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.22.x'

    - name: Install dependencies
      run: |
        cd frontend/bhau_fitness_flutter
        flutter pub get

    - name: Analyze code
      run: |
        cd frontend/bhau_fitness_flutter
        flutter analyze

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker API Image
      run: docker build -t bhau-fitness-api:latest ./backend/BhauFitnessApi
