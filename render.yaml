services:
  # ── BHAU FITNESS API Web Service ────────────────────────────────────────────
  - type: web
    name: bhau-fitness-api
    env: docker
    dockerfilePath: backend/BhauFitnessApi/Dockerfile
    # Must match the Dockerfile, which COPYs BhauFitnessApi.csproj from the
    # context root — so the context is the project folder itself.
    dockerContext: backend/BhauFitnessApi
    # "starter" (paid) does not sleep between requests — required so the app
    # loads instantly. The free plan spins down and cold-starts.
    plan: starter
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DB_PROVIDER
        value: Postgres
      # Set DATABASE_URL in the Render dashboard to the Supabase PostgreSQL
      # connection string (or attach a Render database and use fromDatabase).
      - key: DATABASE_URL
        sync: false
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: BhauFitnessApi
      - key: Jwt__Audience
        value: BhauFitnessFlutterApp
      # Comma-separated list of allowed browser origins. MUST be the real
      # frontend URL(s) — a literal "*" is treated as "allow any origin,
      # without credentials". Example: https://bhaufitness.netlify.app
      - key: ALLOWED_ORIGINS
        sync: false
      # Secrets — set these in the Render dashboard, never in this file.
      - key: Gemini__ApiKey
        sync: false
      - key: Razorpay__KeyId
        value: rzp_test_placeholder
      - key: Razorpay__KeySecret
        value: placeholder_secret
